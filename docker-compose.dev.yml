## Development: build from source
## Usage:
##   docker compose -f docker-compose.dev.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "no"
      - --dir
      - /data
      - --dbfilename
      - dump.rdb
    volumes:
      - ${DATA_DIR:-./data}:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDISHOST: redis:6379
      REDISPASS: ""
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        APP_HOSTNAME: ${APP_HOSTNAME:-onetimelink.me}
        SHOW_BLOG: ${SHOW_BLOG:-false}
    restart: unless-stopped
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-onetimelink.me}
      NGINX_PORT: 8080
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:8080"
