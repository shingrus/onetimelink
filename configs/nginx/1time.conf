# SPA/API deployment for 1time.io
# This serves the built React frontend from /var/www/1time
# and proxies only /api/ to the Go backend on 127.0.0.1:8080.
#
# It intentionally does not expose the deprecated template-backed routes
# such as /view/... or /saveSecret.

upstream 1time_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Per-client API throttling. Keep write endpoints tighter than reads and
# allow a larger budget for background stats pings.
limit_req_zone $binary_remote_addr zone=api_write:10m rate=45r/m;
limit_req_zone $binary_remote_addr zone=api_read:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_stats:10m rate=240r/m;
limit_req_status 429;

# --- Shared security headers (included in every location that uses add_header) ---
# nginx's add_header in a location block silently drops all server-level
# add_header directives, so we use an include to keep them in sync.
# CSP allows 'unsafe-inline' for script-src and style-src because the
# Next.js static export uses inline <script type="application/ld+json">
# blocks and inline CSS injection. Nonce-based CSP is not feasible with
# output: 'export' (no server-side rendering to inject nonces).
map $uri $_placeholder_for_headers {
    default 0;
}
# The actual headers are in the include file below.

server {
    server_name 1time.io;
    server_tokens off;

    root /var/www/1time;
    index index.html;

    # Enable gzip for text-based assets. Without this, JS/CSS/JSON
    # transfer at full size (e.g. 219KB instead of 68KB), adding 2-3s
    # to LCP on throttled connections. woff2 fonts are already compressed.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    access_log /var/log/nginx/1time.access.log;
    error_log /var/log/nginx/1time.error.log warn;

    client_max_body_size 128k;

    # Security headers (server level — applies to locations without add_header)
    include /etc/nginx/snippets/1time-security-headers.conf;

    # 404 page — Next.js static export generates /404.html
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 301 redirect: old URL → new URL (was indexed by Google under old path)
    location = /create-password-14-symbols {
        return 301 /password-generator-14-characters/;
    }
    location = /create-password-14-symbols/ {
        return 301 /password-generator-14-characters/;
    }
    location = /strong-password-generator {
        return 301 /password-generator/;
    }
    location = /strong-password-generator/ {
        return 301 /password-generator/;
    }
    location = /random-password-generator {
        return 301 /password-generator/;
    }
    location = /random-password-generator/ {
        return 301 /password-generator/;
    }


    location = /ico.png {
        try_files /favicon-1024.png =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:woff2|woff|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        include /etc/nginx/snippets/1time-security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    location = /api/saveSecret {
        limit_req zone=api_write burst=10 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/1time-security-headers.conf;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/get {
        limit_req zone=api_read burst=15 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/1time-security-headers.conf;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/stat {
        limit_req zone=api_stats burst=30 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/1time-security-headers.conf;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api/ {
        limit_req zone=api_read burst=15 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        include /etc/nginx/snippets/1time-security-headers.conf;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        include /etc/nginx/snippets/1time-security-headers.conf;
        try_files $uri =404;
    }

    # Next.js aggressive cache /_next/static.
    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/1time-security-headers.conf;
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location = /favicon-optimized.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /favicon-1024.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # Next.js static export with trailingSlash: each route is a folder
    # with index.html inside (e.g. /about/ -> /about/index.html).
    # Unknown paths return 404 instead of homepage (avoids soft-404 for SEO).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/1time.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1time.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}

# HTTP → HTTPS redirect (apex)
server {
    listen 80;
    listen [::]:80;
    server_name 1time.io;
    server_tokens off;
    return 301 https://1time.io$request_uri;
}

# www → apex redirect (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.1time.io;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/1time.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1time.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://1time.io$request_uri;
}

# www → apex redirect (HTTP)
server {
    listen 80;
    listen [::]:80;
    server_name www.1time.io;
    server_tokens off;
    return 301 https://1time.io$request_uri;
}
