# SPA/API deployment for 1time.io
# This serves the built React frontend from /var/www/1time
# and proxies only /api/ to the Go backend on 127.0.0.1:8080.
#
# It intentionally does not expose the deprecated template-backed routes
# such as /view/... or /saveSecret.

upstream 1time_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

# Per-client API throttling. Keep write endpoints tighter than reads and
# allow a larger budget for background stats pings.
limit_req_zone $binary_remote_addr zone=api_write:10m rate=45r/m;
limit_req_zone $binary_remote_addr zone=api_read:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_stats:10m rate=240r/m;
limit_req_status 429;

server {
    server_name 1time.io;
    server_tokens off;

    root /var/www/1time;
    index index.html;

    access_log /var/log/nginx/1time.access.log;
    error_log /var/log/nginx/1time.error.log warn;

    client_max_body_size 128k;

    # Security headers for the public site. Keep CSP in report-only mode for
    # now because the exported Next.js build still relies on inline scripts
    # and inline CSS.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;

    # 404 page — Next.js static export generates /404.html
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 301 redirect: old URL → new URL (was indexed by Google under old path)
    location = /create-password-14-symbols {
        return 301 /password-generator-14-characters/;
    }
    location = /create-password-14-symbols/ {
        return 301 /password-generator-14-characters/;
    }
    location = /strong-password-generator {
        return 301 /password-generator/;
    }
    location = /strong-password-generator/ {
        return 301 /password-generator/;
    }
    location = /random-password-generator {
        return 301 /password-generator/;
    }
    location = /random-password-generator/ {
        return 301 /password-generator/;
    }


    location = /ico.png {
        try_files /favicon-1024.png =404;
        access_log off;
        log_not_found off;
    }

    location ~* \.(?:woff2|woff|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        access_log off;
        try_files $uri =404;
    }

    location = /api/saveSecret {
        limit_req zone=api_write burst=10 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/get {
        limit_req zone=api_read burst=15 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /api/stat {
        limit_req zone=api_stats burst=30 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /api/ {
        limit_req zone=api_read burst=15 nodelay;
        proxy_pass http://1time_backend;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        proxy_hide_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        try_files $uri =404;
    }

    # Next.js aggressive cache /_next/static.
    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'report-sample'; style-src 'self' 'report-sample'" always;
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location = /favicon-optimized.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /favicon-1024.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # Next.js static export with trailingSlash: each route is a folder
    # with index.html inside (e.g. /about/ -> /about/index.html).
    # Unknown paths return 404 instead of homepage (avoids soft-404 for SEO).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/1time.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1time.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

}

server {
    listen 80;
    listen [::]:80;
    server_name 1time.io;
    server_tokens off;
    return 301 https://1time.io$request_uri;
}
