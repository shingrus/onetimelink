# SPA/API deployment sample for onetimelink.
# This serves the built React frontend from /var/www/onetimelink
# and proxies only /api/ to the Go backend on 127.0.0.1:8080.
#
# It intentionally does not expose the deprecated template-backed routes
# such as /view/... or /saveSecret.

upstream onetimelink_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name onetimelink.me;

    root /var/www/onetimelink;
    index index.html;

    access_log /var/log/nginx/onetimelink.access.log;
    error_log /var/log/nginx/onetimelink.error.log warn;

    client_max_body_size 128k;

    location = /ico.png {
        try_files /favicon-1024.png =404;
        access_log off;
        log_not_found off;
    }

    location ^~ /api/ {
        proxy_pass http://onetimelink_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Next.js aggressive cache /_next/static.
    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location = /favicon-optimized.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /favicon-1024.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # Next.js static export with trailingSlash: each route is a folder
    # with index.html inside (e.g. /about/ -> /about/index.html).
    # Fallback to /index.html for client-side routes like /v/#key.
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
