# SPA/API deployment sample for onetimelink.
# This serves the built React frontend from /var/www/onetimelink
# and proxies only /api/ to the Go backend on 127.0.0.1:8080.
#
# It intentionally does not expose the deprecated template-backed routes
# such as /view/... or /saveSecret.

upstream onetimelink_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    server_name onetimelink.me;

    root /var/www/onetimelink;
    index index.html;

    access_log /var/log/nginx/onetimelink.access.log;
    error_log /var/log/nginx/onetimelink.error.log warn;

    client_max_body_size 128k;

    # 404 page — Next.js static export generates /404.html
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 301 redirect: old URL → new URL (was indexed by Google under old path)
    location = /create-password-14-symbols {
        return 301 /password-generator-14-characters/;
    }
    location = /create-password-14-symbols/ {
        return 301 /password-generator-14-characters/;
    }

    location = /ico.png {
        try_files /favicon-1024.png =404;
        access_log off;
        log_not_found off;
    }

    location ^~ /api/ {
        proxy_pass http://onetimelink_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location ^~ /assets/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Next.js aggressive cache /_next/static.
    location ^~ /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /manifest.json {
        try_files $uri =404;
    }

    location = /favicon-optimized.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /favicon-1024.png {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    # Next.js static export with trailingSlash: each route is a folder
    # with index.html inside (e.g. /about/ -> /about/index.html).
    # Unknown paths return 404 instead of homepage (avoids soft-404 for SEO).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/onetimelink.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/onetimelink.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = onetimelink.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name onetimelink.me;
    return 404; # managed by Certbot


}
