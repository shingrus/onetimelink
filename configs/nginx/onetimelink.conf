# Legacy redirect: onetimelink.me → 1time.io
# Path-specific redirects go first to avoid double-301 chains for URLs
# that changed path during the migration (GSC-indexed old paths).

server {
    server_name onetimelink.me;
    server_tokens off;

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/onetimelink.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onetimelink.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Old paths that changed during migration — redirect directly to final URL
    # to avoid double-301 chains (onetimelink.me → 1time.io/old → 1time.io/new)
    location = /strong-password-generator {
        return 301 https://1time.io/password-generator/;
    }
    location = /strong-password-generator/ {
        return 301 https://1time.io/password-generator/;
    }
    location = /create-password-14-symbols {
        return 301 https://1time.io/password-generator-14-characters/;
    }
    location = /create-password-14-symbols/ {
        return 301 https://1time.io/password-generator-14-characters/;
    }
    location = /random-password-generator {
        return 301 https://1time.io/password-generator/;
    }
    location = /random-password-generator/ {
        return 301 https://1time.io/password-generator/;
    }

    # Everything else: 301 with same path
    location / {
        return 301 https://1time.io$request_uri;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name onetimelink.me;
    server_tokens off;

    location = /strong-password-generator {
        return 301 https://1time.io/password-generator/;
    }
    location = /strong-password-generator/ {
        return 301 https://1time.io/password-generator/;
    }
    location = /create-password-14-symbols {
        return 301 https://1time.io/password-generator-14-characters/;
    }
    location = /create-password-14-symbols/ {
        return 301 https://1time.io/password-generator-14-characters/;
    }
    location = /random-password-generator {
        return 301 https://1time.io/password-generator/;
    }
    location = /random-password-generator/ {
        return 301 https://1time.io/password-generator/;
    }

    location / {
        return 301 https://1time.io$request_uri;
    }
}
