# Shared security headers for 1time.io
# Include this in every location block that uses add_header (nginx silently
# drops server-level add_header directives when a location has its own).
#
# Deploy to: /etc/nginx/snippets/1time-security-headers.conf
# Then reference as: include /etc/nginx/snippets/1time-security-headers.conf;

# HSTS: 1 year, include subdomains, eligible for browser preload list.
# Submit to https://hstspreload.org after deploying.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# CSP — enforced (not report-only).
# 'unsafe-inline' is required for script-src and style-src because:
#   - script-src: Next.js static export injects inline <script> tags for
#     JSON-LD structured data and hydration bootstrapping
#   - style-src: the <InlineCss> component injects CSS inline, and JSX
#     style={{}} props generate inline styles
# Nonce-based CSP is not feasible with output: 'export' (no SSR to inject nonces).
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; connect-src 'self'; img-src 'self' data:; font-src 'self'; manifest-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;
