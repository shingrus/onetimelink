    <!-- Critical CSS: inlined to eliminate render-blocking for above-fold content -->
    <style>
      :root{--bg:#FAF9F6;--surface:#fff;--text:#1C1917;--text-secondary:#57534E;--text-muted:#A8A29E;--accent:#EA580C;--accent-hover:#C2410C;--accent-light:#FFF7ED;--border:#E7E5E4;--border-focus:#EA580C;--success:#16A34A;--radius:10px;--radius-sm:6px;--shadow-sm:0 1px 2px rgba(28,25,23,.05);--shadow:0 1px 3px rgba(28,25,23,.08),0 1px 2px rgba(28,25,23,.04);--shadow-lg:0 4px 12px rgba(28,25,23,.08);--font-display:'Bricolage Grotesque Variable','Bricolage Grotesque',system-ui,sans-serif;--font-body:'Outfit Variable','Outfit',system-ui,sans-serif;--transition:150ms ease}
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
      body{font-family:var(--font-body);font-size:15px;font-weight:400;line-height:1.6;color:var(--text);background:var(--bg);min-height:100vh}
      .app-layout{display:flex;flex-direction:column;min-height:100vh}
      .app-header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;max-width:640px;margin:0 auto;width:100%}
      .app-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text)}
      .app-logo-text{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em}
      .app-logo-text span{color:var(--accent)}
      .app-nav{display:flex;gap:4px}
      .app-nav a{font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;padding:6px 12px;border-radius:var(--radius-sm)}
      .app-nav a.active{color:var(--accent)}
      .app-main{flex:1;max-width:640px;margin:0 auto;width:100%;padding:8px 24px 40px}
      .app-footer{padding:24px;text-align:center;max-width:640px;margin:0 auto;width:100%}
      h1,h2,h3{font-family:var(--font-display);font-weight:700;letter-spacing:-.02em;line-height:1.2}
    </style>
